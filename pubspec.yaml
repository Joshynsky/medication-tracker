name: medication_tracker
description: "A medication tracking app for patients and caregivers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_riverpod: ^2.6.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.0
  supabase_flutter: ^2.8.1
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  go_router: ^14.6.2
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
